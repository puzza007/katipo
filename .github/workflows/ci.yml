on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Erlang/OTP ${{matrix.otp}} / rebar3 ${{matrix.rebar3}}
    strategy:
      matrix:
        otp: ['27']
        rebar3: ['3.24.0']

    steps:
      - uses: actions/checkout@v4

      - name: Start httpbin server
        run: |
          cd test/http3-httpbin
          docker compose up -d
          # Wait until httpbin actually serves through Caddy. `curl -s` exits 0
          # on any response, including a 502 while the Python httpbin behind
          # Caddy is still starting, so gate on a real 200 to avoid a race.
          for i in {1..30}; do
            code=$(curl -k -s -o /dev/null -w '%{http_code}' https://localhost:8443/get || true)
            [ "$code" = "200" ] && break
            echo "Waiting for httpbin (got $code)..."
            sleep 2
          done

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          rebar3-version: ${{matrix.rebar3}}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc libevent-dev libcurl4-openssl-dev libssl-dev lcov

      - name: Run tests with coverage
        env:
          COVERAGE: 1
        run: rebar3 ct --cover

      - name: Generate Erlang coverage report
        run: rebar3 covertool generate

      - name: Generate C coverage report
        run: |
          cd c_src
          lcov --capture --directory . --output-file coverage.info
          # Remove system headers from coverage
          lcov --remove coverage.info '/usr/*' --output-file coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./_build/test/covertool/katipo.covertool.xml,./c_src/coverage.info
          flags: erlang,c
          disable_search: true
          fail_ci_if_error: false

      - name: Run dialyzer
        run: rebar3 dialyzer

      - name: Run xref
        run: rebar3 xref

      - name: Run lint
        run: rebar3 lint

      - name: Stop httpbin server
        if: always()
        run: |
          cd test/http3-httpbin
          docker compose down

  test-asan:
    runs-on: ubuntu-latest
    name: AddressSanitizer
    strategy:
      matrix:
        otp: ['27']
        rebar3: ['3.24.0']

    steps:
      - uses: actions/checkout@v4

      - name: Start httpbin server
        run: |
          cd test/http3-httpbin
          docker compose up -d
          # Wait until httpbin actually serves through Caddy. `curl -s` exits 0
          # on any response, including a 502 while the Python httpbin behind
          # Caddy is still starting, so gate on a real 200 to avoid a race.
          for i in {1..30}; do
            code=$(curl -k -s -o /dev/null -w '%{http_code}' https://localhost:8443/get || true)
            [ "$code" = "200" ] && break
            echo "Waiting for httpbin (got $code)..."
            sleep 2
          done

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.otp}}
          rebar3-version: ${{matrix.rebar3}}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc libevent-dev libcurl4-openssl-dev libssl-dev

      - name: Run tests under AddressSanitizer
        env:
          # Build the C port with -fsanitize=address (see c_src/Makefile).
          # rebar3's compile pre-hook runs `make -C c_src`, which picks this up.
          SANITIZE: 1
          # halt_on_error: abort the port on any use-after-free/overflow/double-free.
          # detect_leaks: LeakSanitizer runs at port exit -- the port process calls
          # exit()/errx(), so atexit handlers fire and leaks are reported.
          # log_path: ASan/LSan errors in the BEAM-spawned port don't fail rebar3
          # directly (the port is a child process), so route them to files we can
          # check after the run instead of relying on the exit code.
          ASAN_OPTIONS: halt_on_error=1:detect_leaks=1:log_path=${{ github.workspace }}/asan_log
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/test/lsan.suppressions
        run: |
          rebar3 ct
          # A clean run (no unsuppressed leaks/errors) writes nothing; any
          # asan_log.<pid> file means the sanitizer flagged something.
          if ls "${{ github.workspace }}"/asan_log.* >/dev/null 2>&1; then
            echo "::error::AddressSanitizer/LeakSanitizer reported errors:"
            cat "${{ github.workspace }}"/asan_log.*
            exit 1
          fi
          echo "AddressSanitizer clean."

      - name: Stop httpbin server
        if: always()
        run: |
          cd test/http3-httpbin
          docker compose down

  test-http3:
    runs-on: ubuntu-latest
    name: HTTP/3 Tests

    steps:
      - uses: actions/checkout@v4

      - name: Start HTTP/3 httpbin server
        run: |
          cd test/http3-httpbin
          docker compose up -d
          # Wait until httpbin actually serves through Caddy. `curl -s` exits 0
          # on any response, including a 502 while the Python httpbin behind
          # Caddy is still starting, so gate on a real 200 to avoid a race.
          for i in {1..30}; do
            code=$(curl -k -s -o /dev/null -w '%{http_code}' https://localhost:8443/get || true)
            [ "$code" = "200" ] && break
            echo "Waiting for httpbin (got $code)..."
            sleep 2
          done

      - name: Cache curl HTTP/3 build
        uses: actions/cache@v4
        id: curl-cache
        with:
          path: /tmp/curl-http3
          key: curl-http3-8.11.0-recursive-${{ runner.os }}

      - name: Build curl with HTTP/3 support
        if: steps.curl-cache.outputs.cache-hit != 'true'
        run: |
          set -ex
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config autoconf libtool cmake libpsl-dev

          mkdir -p /tmp/curl-http3
          cd /tmp/curl-http3

          # Build OpenSSL with QUIC support (quictls)
          git clone --depth 1 -b openssl-3.1.4+quic https://github.com/quictls/openssl.git
          cd openssl
          ./config --prefix=/tmp/curl-http3/install --openssldir=/tmp/curl-http3/install/ssl
          make -j$(nproc)
          make install_sw
          cd ..

          # Build nghttp3 (sfparse is built as a submodule)
          git clone --recursive https://github.com/ngtcp2/nghttp3.git
          cd nghttp3
          autoreconf -fi
          ./configure --prefix=/tmp/curl-http3/install --enable-lib-only \
            PKG_CONFIG_PATH=/tmp/curl-http3/install/lib/pkgconfig:/tmp/curl-http3/install/lib64/pkgconfig
          make -j$(nproc)
          make install
          cd ..

          # Build ngtcp2
          git clone --depth 1 https://github.com/ngtcp2/ngtcp2.git
          cd ngtcp2
          autoreconf -fi
          ./configure --prefix=/tmp/curl-http3/install --enable-lib-only \
            PKG_CONFIG_PATH=/tmp/curl-http3/install/lib/pkgconfig:/tmp/curl-http3/install/lib64/pkgconfig \
            --with-openssl=/tmp/curl-http3/install
          make -j$(nproc)
          make install
          cd ..

          # Build curl with HTTP/3
          git clone --depth 1 -b curl-8_11_0 https://github.com/curl/curl.git
          cd curl
          autoreconf -fi
          ./configure --prefix=/tmp/curl-http3/install \
            --with-openssl=/tmp/curl-http3/install \
            --with-nghttp3=/tmp/curl-http3/install \
            --with-ngtcp2=/tmp/curl-http3/install \
            PKG_CONFIG_PATH=/tmp/curl-http3/install/lib/pkgconfig:/tmp/curl-http3/install/lib64/pkgconfig
          make -j$(nproc)
          make install
          cd ..

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          rebar3-version: '3.24.0'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make gcc libevent-dev

      - name: Build and test with HTTP/3 curl
        env:
          KATIPO_TEST_HTTP3: "true"
          PKG_CONFIG_PATH: /tmp/curl-http3/install/lib/pkgconfig:/tmp/curl-http3/install/lib64/pkgconfig
          LD_LIBRARY_PATH: /tmp/curl-http3/install/lib:/tmp/curl-http3/install/lib64
          CURL_PREFIX: /tmp/curl-http3/install
        run: |
          # Add custom curl to PATH
          export PATH=/tmp/curl-http3/install/bin:$PATH

          # Verify HTTP/3 support
          curl --version | grep -i http3
          curl-config --vernum

          # Build and run tests
          rebar3 ct

      - name: Stop HTTP/3 server
        if: always()
        run: |
          cd test/http3-httpbin
          docker compose down
